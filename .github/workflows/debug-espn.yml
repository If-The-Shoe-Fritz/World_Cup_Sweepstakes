name: debug-espn

# TEMPORARY: probes the ESPN API from the runner and prints what it returns,
# so we can see the real response shape. Delete once live scores are working.
on:
  push:
    branches: [claude/focused-ptolemy-cp4u4v]
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Probe ESPN endpoints
        run: |
          python - <<'PY'
          import json, urllib.request
          def get(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0 probe"})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, json.loads(r.read().decode())
              except Exception as e:
                  return "ERR", repr(e)
          urls = [
              "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611",
              "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260612",
              "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard",
              "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260720",
              "https://site.api.espn.com/apis/v2/scoreboard/header?sport=soccer&league=fifa.world",
          ]
          for u in urls:
              st, data = get(u)
              print("="*70)
              print("URL:", u)
              print("STATUS:", st)
              if isinstance(data, dict):
                  lgs = data.get("leagues") or data.get("sports") or []
                  try:
                      print("leagues:", [l.get("name") or l.get("abbreviation") for l in lgs])
                  except Exception:
                      print("leagues(raw):", str(lgs)[:200])
                  evs = data.get("events") or []
                  print("events:", len(evs), "| top-keys:", list(data.keys())[:12])
                  for ev in evs[:5]:
                      comp = (ev.get("competitions") or [{}])[0]
                      cs = comp.get("competitors") or []
                      names = [c.get("team", {}).get("displayName") for c in cs]
                      scores = [c.get("score") for c in cs]
                      state = ((ev.get("status") or {}).get("type") or {}).get("state")
                      print("   ", ev.get("date"), names, scores, state)
              else:
                  print("body:", str(data)[:400])
          PY
