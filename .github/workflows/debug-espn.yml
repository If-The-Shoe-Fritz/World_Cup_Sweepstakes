name: debug-espn

# TEMPORARY: verifies the fixed updater actually pulls ESPN results. No commit —
# just runs the script and prints counts. Delete once confirmed working.
on:
  push:
    branches: [claude/focused-ptolemy-cp4u4v]
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run updater
        run: python scripts/update_data.py
      - name: Show resulting finished count
        run: |
          python -c "import json; M=json.load(open('data/matches.json')); print('FINISHED MATCHES NOW:', sum(1 for m in M if m['finished']))"
