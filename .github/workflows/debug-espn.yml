name: debug-espn

on:
  push:
    branches: [claude/focused-ptolemy-cp4u4v]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run real updater
        run: python scripts/update_data.py
      - name: Commit + push (tests write access)
        run: |
          git config user.name "wc26-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/teams.json data/matches.json data/grouptables.json data/owners.json data/stadiums.json)" ]; then
            git add data/
            git commit -m "Live scores via ESPN [skip ci]"
            git push && echo "PUSH OK — write access works"
          else
            echo "No score changes."
          fi
